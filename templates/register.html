<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/" class="active">Home</a></li>
                <li><a href="/register">Register</a></li>
                <li><a href="/elections">Manage Elections</a></li>
                <li><a href="/vote">Cast Vote</a></li>
                <li><a href="/results">View Results</a></li>
            </ul>
        </nav>
    </header>
    <main class="container mt-5">
        <h2>User Registration</h2>
        <form id="registerForm" class="fade-in">
            <div class="mb-3">
                <label for="user_id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user_id" required>
            </div>
            <div class="mb-3">
                <label for="public_key" class="form-label">Public Key</label>
                <input type="text" class="form-control" id="public_key" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </main>
    <footer class="text-center mt-5">
        <p>&copy; 2023 Decentralized Voting System</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
